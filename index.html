<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokodokosa - クイズアプリ</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .screen {
            display: none !important;
        }

        .screen.active {
            display: block !important;
        }

        /* クイズ画面だけはflexを維持して横並びにする */
        #quiz-container.active {
            display: flex !important;
        }
    </style>
</head>

<body>
    <div id="title-screen" class="screen active">
        <h1>Kokodokosa</h1>
        <!-- index.html: ジャンル選択ボタンのみ書き換えてください -->
        <div class="mode-selection-container">

            <!-- ドメイン -->
            <div class="mode-row">
                <div class="mode-label">ドメイン</div>
                <div class="mode-buttons">
                    <button class="choice-button mini" onclick="startQuiz('domain', 10)">10問 (サクッと)</button>
                    <button class="choice-button" onclick="startQuiz('domain', 0)">全問 (集中)</button>
                </div>
            </div>

            <!-- 文字 -->
            <div class="mode-row">
                <div class="mode-label">文字</div>
                <div class="mode-buttons">
                    <button class="choice-button mini" onclick="startQuiz('text', 10)">10問 (サクッと)</button>
                    <button class="choice-button" onclick="startQuiz('text', 0)">全問 (集中)</button>
                </div>
            </div>

            <!-- 標識：一時停止 -->
            <div class="mode-row">
                <div class="mode-label">一時停止</div>
                <div class="mode-buttons">
                    <button class="choice-button mini" onclick="startQuiz('sign-stop', 10)">10問 (サクッと)</button>
                    <button class="choice-button" onclick="startQuiz('sign-stop', 0)">全問 (集中)</button>
                </div>
            </div>

            <!-- 標識：横断歩道 -->
            <div class="mode-row">
                <div class="mode-label">横断歩道</div>
                <div class="mode-buttons">
                    <button class="choice-button mini" onclick="startQuiz('sign-crossing', 10)">10問 (サクッと)</button>
                    <button class="choice-button" onclick="startQuiz('sign-crossing', 0)">全問 (集中)</button>
                </div>
            </div>

        </div>
    </div>

    <div id="setup-screen" class="screen">
        <h2 id="setup-mode-name">ミッション準備</h2>
        <div class="difficulty-select">
            <p>難易度を選択してください</p>
            <button class="choice-button" onclick="startQuiz('easy')">初級</button>
            <button class="choice-button" onclick="startQuiz('normal')">中級</button>
            <button class="choice-button" onclick="startQuiz('hard')">上級</button>
        </div>
        <button class="next-button" onclick="showTitle()">タイトルに戻る</button>
    </div>

    <div id="quiz-container" class="screen">
        <!-- インラインスタイルを削除し、クラスで制御 -->
        <div class="main-layout">
            <div class="quiz-main">
                <div id="app-question">この画像から国を特定せよ</div>
                <div id="quiz-question-container">
                    <img id="quiz-question-image" src="">
                </div>
            </div>

            <div class="quiz-sub">
                <!-- 1. ステータス -->
                <div id="status-bar">
                    <span id="current-mode-display">モード</span>
                    <span id="player-lv">Lv.1</span>
                    <span id="current-score">正答: 0</span>
                </div>

                <!-- 2. 選択肢ボタン -->
                <div class="button-grid">
                    <button id="quiz-choice0" class="choice-button" onclick="checkAnswer(0)"></button>
                    <button id="quiz-choice1" class="choice-button" onclick="checkAnswer(1)"></button>
                    <button id="quiz-choice2" class="choice-button" onclick="checkAnswer(2)"></button>
                    <button id="quiz-choice3" class="choice-button" onclick="checkAnswer(3)"></button>
                </div>

                <!-- 3. 結果・解説エリア -->
                <div id="quiz-msg"></div>
                <div id="quiz-note"></div>

                <button id="next-button" class="next-button" onclick="loadQuestion()"
                    style="display:none;">次の問題へ</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
